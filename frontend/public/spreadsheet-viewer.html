<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spreadsheet Preview</title>
    <link rel="stylesheet" href="/xlsx/plugins/css/pluginsCss.css" />
    <link rel="stylesheet" href="/xlsx/plugins/plugins.css" />
    <link rel="stylesheet" href="/xlsx/css/luckysheet.css" />
    <link rel="stylesheet" href="/xlsx/assets/iconfont/iconfont.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f6f8fb;
        overflow: hidden;
      }

      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(246, 248, 251, 0.92);
        color: #22324c;
        font: 600 16px/1.4 "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif;
        z-index: 20;
      }

      #error {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #fff1ef;
        color: #8e2c1c;
        font: 600 16px/1.5 "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif;
        z-index: 30;
      }

      #luckysheet {
        position: absolute;
        inset: 0;
      }
    </style>
    <script src="/xlsx/plugins/js/plugin.js"></script>
    <script src="/xlsx/luckysheet.umd.js"></script>
    <script src="/xlsx/luckyexcel.umd.js"></script>
  </head>
  <body>
    <div id="loading">Loading spreadsheet preview...</div>
    <div id="error"></div>
    <div id="luckysheet"></div>
    <script>
      const params = new URLSearchParams(window.location.search)
      const file = params.get('file')
      const lang = params.get('lang') || 'en'
      const loading = document.getElementById('loading')
      const error = document.getElementById('error')

      function showError(message) {
        loading.style.display = 'none'
        error.style.display = 'flex'
        error.textContent = message
      }

      if (!file) {
        showError('Missing spreadsheet file URL.')
      } else {
        LuckyExcel.transformExcelToLuckyByUrl(file, 'spreadsheet.xlsx', function (exportJson) {
          if (!exportJson.sheets || exportJson.sheets.length === 0) {
            showError('Unable to read spreadsheet content.')
            return
          }

          loading.style.display = 'none'
          if (window.luckysheet && window.luckysheet.destroy) {
            window.luckysheet.destroy()
          }

          window.luckysheet.create({
            container: 'luckysheet',
            lang: lang === 'zh' ? 'zh' : 'en',
            data: exportJson.sheets,
            title: exportJson.info && exportJson.info.name ? exportJson.info.name : 'Spreadsheet Preview',
            allowCopy: true,
            allowEdit: false,
            showtoolbar: false,
            showinfobar: false,
            showsheetbar: true,
            showstatisticBar: false,
            showformulaBar: false,
            sheetFormulaBar: false,
            showRowBar: true,
            showColumnBar: true,
            enableAddRow: false,
            enableAddCol: false,
            enableAddBackTop: false,
            sheetBottomConfig: false,
            userInfo: false,
            forceCalculation: false,
            enableContextMenu: false,
            rowHeaderWidth: 52,
            cellRightClickConfig: {
              copy: false,
              copyAs: false,
              paste: false,
              insertRow: false,
              insertColumn: false,
              deleteRow: false,
              deleteColumn: false,
              deleteCell: false,
              hideRow: false,
              hideColumn: false,
              rowHeight: false,
              columnWidth: false,
              clear: false,
              matrix: false,
              sort: false,
              filter: false,
              chart: false,
              image: false,
              link: false,
              data: false,
              cellFormat: false,
            },
            showtoolbarConfig: {
              undoRedo: false,
              paintFormat: false,
              currencyFormat: false,
              percentageFormat: false,
              numberDecrease: false,
              numberIncrease: false,
              moreFormats: false,
              font: false,
              fontSize: false,
              bold: false,
              italic: false,
              strikethrough: false,
              underline: false,
              textColor: false,
              fillColor: false,
              border: false,
              mergeCell: false,
              horizontalAlignMode: false,
              verticalAlignMode: false,
              textWrapMode: false,
              textRotateMode: false,
              image: false,
              link: false,
              chart: false,
              postil: false,
              pivotTable: false,
              function: false,
              frozenMode: false,
              sortAndFilter: false,
              conditionalFormat: false,
              dataVerification: false,
              splitColumn: false,
              screenshot: false,
              findAndReplace: false,
              protection: false,
              print: false,
              exportXlsx: false,
            },
          })
        })
      }
    </script>
  </body>
</html>
