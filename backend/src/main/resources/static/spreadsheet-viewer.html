<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyPreviewer Spreadsheet</title>
    <link rel="stylesheet" href="/xlsx/plugins/css/pluginsCss.css" />
    <link rel="stylesheet" href="/xlsx/plugins/plugins.css" />
    <link rel="stylesheet" href="/xlsx/css/luckysheet.css" />
    <link rel="stylesheet" href="/xlsx/assets/iconfont/iconfont.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f5f7fb;
        overflow: hidden;
        overscroll-behavior: none;
        font-family: "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif;
      }

      #loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(245, 247, 251, 0.94);
        color: #22324c;
        font: 600 16px/1.4 "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif;
        z-index: 20;
      }

      #error {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #fff1ef;
        color: #8e2c1c;
        font: 600 16px/1.5 "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif;
        z-index: 30;
      }

      #sheet-tabs {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 6px;
        display: flex;
        gap: 2px;
        align-items: flex-end;
        flex-wrap: wrap;
        z-index: 40;
        pointer-events: none;
      }

      #luckysheet {
        position: absolute;
        inset: 0;
        overscroll-behavior: contain;
      }

      .luckysheet,
      .luckysheet * {
        font-family: "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif !important;
      }

      .luckysheetLoaderGif,
      .luckysheet-loading-image .image-type {
        background-image: none !important;
      }

      .luckysheet_info_detail,
      .luckysheet-wa-calculate,
      .luckysheet-toolbar-button-outer-box,
      .luckysheet-cols-menu,
      .luckysheet-rows-menu,
      .luckysheet-sheets-add,
      .luckysheet-sheets-m,
      #luckysheet-sheets-leftscroll,
      #luckysheet-sheets-rightscroll {
        display: none !important;
      }

      #luckysheet-input-box,
      #luckysheet-input-box-index,
      #luckysheet-input-box-container,
      #luckysheet-formula-functionrange-select,
      #luckysheet-icon-morebtn,
      #luckysheet-sheet-list,
      #luckysheet-cols-h-c,
      #luckysheet-rows-h,
      #luckysheet-left-top {
        display: none !important;
      }

      #luckysheet-cell-main,
      #luckysheet-cell-flow,
      #luckysheetTableContent {
        top: 0 !important;
        left: 0 !important;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .luckysheet-sheet-area {
        min-height: 48px;
        border-top: 1px solid #d7dbe2;
        background: linear-gradient(180deg, #f7f8fa 0%, #eef1f5 100%);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
      }

      .luckysheet-sheet-area .luckysheet-sheets-item,
      .luckysheet-sheet-area .luckysheet-sheets-item-active {
        opacity: 0 !important;
        pointer-events: none !important;
        width: 0 !important;
        min-width: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
      }

      .sheet-tab {
        pointer-events: auto;
        min-width: 112px;
        border: 1px solid #d2d7de;
        border-bottom-color: transparent;
        border-radius: 8px 8px 0 0;
        padding: 7px 16px 8px;
        background: linear-gradient(180deg, #fcfcfd 0%, #eff2f6 100%);
        color: #5d6777;
        font: 500 13px/1 "IBM Plex Sans", "Noto Sans SC", system-ui, sans-serif;
        cursor: pointer;
        transition: background 0.14s ease, color 0.14s ease, border-color 0.14s ease;
      }

      .sheet-tab:hover {
        background: linear-gradient(180deg, #ffffff 0%, #f4f6f9 100%);
        color: #39485d;
      }

      .sheet-tab.is-active {
        background: #ffffff;
        color: #22324c;
        border-color: #cfd4db;
        box-shadow: inset 0 2px 0 #1f6feb;
      }
    </style>
    <script src="/xlsx/plugins/js/plugin.js"></script>
    <script src="/xlsx/luckysheet.umd.js"></script>
    <script src="/xlsx/luckyexcel.umd.js"></script>
  </head>
  <body>
    <div id="loading">Loading spreadsheet preview...</div>
    <div id="error"></div>
    <div id="luckysheet"></div>
    <div id="sheet-tabs"></div>
    <script>
      const params = new URLSearchParams(window.location.search)
      const file = params.get('file')
      const lang = params.get('lang') || 'en'
      const loading = document.getElementById('loading')
      const error = document.getElementById('error')
      const sheetTabs = document.getElementById('sheet-tabs')

      function excelSerialToDate(value) {
        const utcDays = Math.floor(value - 25569)
        const utcValue = utcDays * 86400
        const dateInfo = new Date(utcValue * 1000)
        const fractionalDay = value - Math.floor(value) + 0.0000001
        const totalSeconds = Math.floor(86400 * fractionalDay)
        const seconds = totalSeconds % 60
        const totalMinutes = Math.floor(totalSeconds / 60)
        const minutes = totalMinutes % 60
        const hours = Math.floor(totalMinutes / 60)

        dateInfo.setUTCHours(hours)
        dateInfo.setUTCMinutes(minutes)
        dateInfo.setUTCSeconds(seconds)
        dateInfo.setUTCMilliseconds(0)
        return dateInfo
      }

      function formatExcelDate(value) {
        const date = excelSerialToDate(value)
        const year = date.getUTCFullYear()
        const month = date.getUTCMonth() + 1
        const day = date.getUTCDate()
        return `${year}/${month}/${day}`
      }

      function normalizeDateColumns(exportJson) {
        exportJson.sheets.forEach((sheet) => {
          const headerByColumn = new Map()
          const dateColumns = new Set()
          const cells = []

          if (Array.isArray(sheet.celldata)) {
            sheet.celldata.forEach((entry) => {
              if (entry && entry.v) {
                cells.push({ row: entry.r, col: entry.c, cell: entry.v })
              }
            })
          }

          if (Array.isArray(sheet.data)) {
            sheet.data.forEach((row, rowIndex) => {
              if (!Array.isArray(row)) {
                return
              }
              row.forEach((cell, colIndex) => {
                if (cell) {
                  cells.push({ row: rowIndex, col: colIndex, cell })
                }
              })
            })
          }

          cells.forEach(({ row, col, cell }) => {
            if (row !== 0) {
              return
            }
            const text = String(cell.m ?? cell.v ?? '').trim().toLowerCase()
            if (text) {
              headerByColumn.set(col, text)
            }
          })

          headerByColumn.forEach((text, col) => {
            if (text.includes('date')) {
              dateColumns.add(col)
            }
          })

          cells.forEach(({ row, col, cell }) => {
            if (row === 0 || !dateColumns.has(col)) {
              return
            }

            const rawValue = typeof cell.v === 'number' ? cell.v : Number.NaN
            if (!Number.isFinite(rawValue) || rawValue < 1 || rawValue > 90000) {
              return
            }

            cell.ct = {
              fa: 'yyyy/m/d',
              t: 'n',
            }
            cell.m = formatExcelDate(rawValue)
          })
        })
      }

      function renderSheetTabs(sheets) {
        if (!sheetTabs) {
          return
        }

        sheetTabs.innerHTML = ''
        const nativeTabs = () => Array.from(document.querySelectorAll('.luckysheet-sheets-item'))
        const initialActiveIndex = Math.max(
          0,
          sheets.findIndex((sheet) => sheet.status === 1 || sheet.status === '1')
        )

        const setActive = (activeIndex) => {
          Array.from(sheetTabs.querySelectorAll('.sheet-tab')).forEach((button, index) => {
            button.classList.toggle('is-active', index === activeIndex)
          })
        }

        sheets.forEach((sheet, index) => {
          const button = document.createElement('button')
          button.type = 'button'
          button.className = `sheet-tab${index === initialActiveIndex ? ' is-active' : ''}`
          button.textContent = sheet.name || `Sheet ${index + 1}`
          button.addEventListener('click', () => {
            const currentNativeTabs = nativeTabs()
            if (currentNativeTabs[index]) {
              currentNativeTabs[index].click()
            }
            setActive(index)
          })
          sheetTabs.appendChild(button)
        })
      }

      function setupVerticalWheelDamping() {
        const cellMain = document.getElementById('luckysheet-cell-main')
        if (!cellMain) {
          return
        }

        let rafId = 0
        let queuedDeltaY = 0
        const flush = () => {
          cellMain.scrollTop += queuedDeltaY * 0.45
          queuedDeltaY = 0
          rafId = 0
        }

        cellMain.addEventListener(
          'wheel',
          (event) => {
            if (Math.abs(event.deltaX) >= Math.abs(event.deltaY) || Math.abs(event.deltaY) < 1) {
              return
            }

            event.preventDefault()
            queuedDeltaY += event.deltaY
            if (!rafId) {
              rafId = window.requestAnimationFrame(flush)
            }
          },
          { passive: false }
        )
      }

      function showError(message) {
        loading.style.display = 'none'
        error.style.display = 'flex'
        error.textContent = message
      }

      function buildWorkbook(exportJson) {
        const workbookName =
          exportJson.info && exportJson.info.name ? exportJson.info.name : 'EasyPreviewer Workbook'

        normalizeDateColumns(exportJson)

        window.luckysheet.create({
          container: 'luckysheet',
          lang: lang === 'zh' ? 'zh' : 'en',
          data: exportJson.sheets,
          title: workbookName,
          userInfo: false,
          allowCopy: true,
          allowEdit: false,
          showtoolbar: false,
          showinfobar: false,
          showsheetbar: true,
          showstatisticBar: false,
          showformulaBar: false,
          sheetFormulaBar: false,
          hideLineNumBar: true,
          closeRightClick: true,
          closeSheet: true,
          hideAdd: true,
          enableAddRow: false,
          enableAddCol: false,
          enableAddBackTop: false,
          sheetBottomConfig: false,
          forceCalculation: false,
          enableContextMenu: false,
          rowHeaderWidth: 0,
          columnHeaderHeight: 0,
          defaultColWidth: 88,
          defaultRowHeight: 24,
          zoomRatio: 1,
          cellRightClickConfig: {
            copy: false,
            copyAs: false,
            paste: false,
            insertRow: false,
            insertColumn: false,
            deleteRow: false,
            deleteColumn: false,
            deleteCell: false,
            hideRow: false,
            hideColumn: false,
            rowHeight: false,
            columnWidth: false,
            clear: false,
            matrix: false,
            sort: false,
            filter: false,
            chart: false,
            image: false,
            link: false,
            data: false,
            cellFormat: false,
          },
          showtoolbarConfig: {
            undoRedo: false,
            paintFormat: false,
            currencyFormat: false,
            percentageFormat: false,
            numberDecrease: false,
            numberIncrease: false,
            moreFormats: false,
            font: false,
            fontSize: false,
            bold: false,
            italic: false,
            strikethrough: false,
            underline: false,
            textColor: false,
            fillColor: false,
            border: false,
            mergeCell: false,
            horizontalAlignMode: false,
            verticalAlignMode: false,
            textWrapMode: false,
            textRotateMode: false,
            image: false,
            link: false,
            chart: false,
            postil: false,
            pivotTable: false,
            function: false,
            frozenMode: false,
            sortAndFilter: false,
            conditionalFormat: false,
            dataVerification: false,
            splitColumn: false,
            screenshot: false,
            findAndReplace: false,
            protection: false,
            print: false,
            exportXlsx: false,
          },
          hook: {
            workbookCreateAfter: polishViewerChrome,
          },
        })

        polishViewerChrome()
        renderSheetTabs(exportJson.sheets)
        setupVerticalWheelDamping()
      }

      function polishViewerChrome() {
        const selectors = [
          '.luckysheet_info_detail',
          '.luckysheet-wa-calculate',
          '.luckysheet-toolbar-button-outer-box',
          '.luckysheet-cols-menu',
          '.luckysheet-rows-menu',
          '.luckysheet-sheets-add',
          '.luckysheet-sheets-m',
          '#luckysheet-sheets-leftscroll',
          '#luckysheet-sheets-rightscroll',
          '#luckysheet-input-box',
          '#luckysheet-input-box-index',
          '#luckysheet-input-box-container',
          '#luckysheet-formula-functionrange-select',
          '#luckysheet-icon-morebtn',
          '#luckysheet-sheet-list',
          '#luckysheet-cols-h-c',
          '#luckysheet-rows-h',
          '#luckysheet-left-top',
        ]

        selectors.forEach((selector) => {
          document.querySelectorAll(selector).forEach((element) => {
            element.style.display = 'none'
          })
        })
      }

      if (!file) {
        showError('Missing spreadsheet file URL.')
      } else {
        LuckyExcel.transformExcelToLuckyByUrl(file, 'spreadsheet.xlsx', function (exportJson) {
          if (!exportJson.sheets || exportJson.sheets.length === 0) {
            showError('Unable to read spreadsheet content.')
            return
          }

          loading.style.display = 'none'
          if (window.luckysheet && window.luckysheet.destroy) {
            window.luckysheet.destroy()
          }
          buildWorkbook(exportJson)
        }, undefined, function () {
          showError('Unable to read spreadsheet content.')
        })
      }
    </script>
  </body>
</html>
